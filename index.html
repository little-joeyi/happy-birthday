<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿彎生日快樂！</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6eb; /* 浪漫的粉紅色背景 */
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            background-color: #ff4d79;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #ff1a53;
            transform: scale(1.05);
        }

        /* 隱藏未發生的場景 */
        .hidden {
            display: none;
        }

        h1 {
            color: #ff1a53;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="scene1">
            <h1>拯救小女孩阿糖！</h1>
            <p>阿糖被困住了！阿彎快點擊按鈕累積能量救她！</p>
            <img src="./candy-trapped.png" alt="被困住的阿糖">
            <br>
            <button id="clickBtn" onclick="tapRescue()">點擊解救！(<span id="count">10</span>)</button>
        </div>

        <div id="scene2" class="hidden">
            <h1 style="font-size: 32px;">🎂 阿彎，生日快樂！ 🎂</h1>
            <p>太棒了！你成功救出阿糖了！</p>
            <img src="./candy-happy.png" alt="開心的阿糖">
            <br>
            <button onclick="goToParty()">去參加慶生派對 🎉</button>
        </div>

        <div id="scene3" class="hidden">
            <h1>✨ 我們的快樂派對 ✨</h1>
            <p>阿糖和阿彎要一直快樂在一起！</p>
            <img src="./party.png" alt="阿糖和阿彎的派對">
        </div>

    </div>

    <script>
        let clicksLeft = 10; // 需要點擊的次數

        // 點擊解救的動作
        function tapRescue() {
            clicksLeft--;
            document.getElementById('count').innerText = clicksLeft;

            // 當點到 0 次時，觸發成功
            if (clicksLeft <= 0) {
                showSurprise();
            }
        }

        // 成功畫面與灑花
        function showSurprise() {
            document.getElementById('scene1').classList.add('hidden');
            document.getElementById('scene2').classList.remove('hidden');

            // 啟動連續灑花特效，持續 4 秒
            var duration = 4 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // 前往派對場景
        function goToParty() {
            document.getElementById('scene2').classList.add('hidden');
            document.getElementById('scene3').classList.remove('hidden');
            
            // 派對開始時再加碼灑一次大彩帶
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
